name: My S3 Build

on:
  workflow_dispatch:
  push:
    branches: main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.x"

    - name: Install PlatformIO
      run: |
        python -m pip install setuptools --upgrade pip
        pip install --upgrade platformio

    - name: Run PlatformIO
      run: pio run -d src -e opendtufusion-de

    - name: Compress .elf
      uses: edgarrc/action-7z@v1
      with:
        args: 7z a -t7z -mx=9 src/.pio/build/opendtufusion-de/firmware.elf.7z ./src/.pio/build/opendtufusion-de/firmware.elf

    - name: Rename Firmware
      run: python scripts/getVersion.py opendtufusion-de >> $GITHUB_OUTPUT

    - name: Create Artifact
      uses: actions/upload-artifact@v4
      with:
        name: opendtufusion-de
        path: firmware/*
